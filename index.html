<!DOCTYPE html>
<html>
<head>
    <title>My Waifu</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e;
        }
        #canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="status">⏳ Loading Hiyori...</div>
    <canvas id="canvas"></canvas>

    <!-- Load Live2D Core (local) -->
    <script src="Core/live2dcubismcore.js"></script>
    
    <!-- Load Live2D Framework (from CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@live2d/cubismframework@5/dist/live2dcubismframework.min.js"></script>
    
    <script>
        // Check if both loaded
        const statusEl = document.getElementById('status');
        
        if (typeof Live2DCubismCore === 'undefined') {
            statusEl.textContent = '❌ Core failed to load';
        } else if (typeof Live2DCubismFramework === 'undefined') {
            statusEl.textContent = '❌ Framework failed to load (check CDN)';
            console.log('Core loaded but Framework not found');
        } else {
            statusEl.textContent = '✅ Both loaded! Ready for Hiyori! 🎉';
            console.log('✅ Core and Framework loaded!');
        }
    </script>
</body>
</html>
