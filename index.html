<!DOCTYPE html>
<html>
<head>
    <title>My Waifu</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e;
        }
        #canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="status">⏳ Loading...</div>
    <canvas id="canvas"></canvas>

    <!-- Load Live2D Core -->
    <script src="Core/live2dcubismcore.js"></script>
    
    <!-- Load Live2D Framework from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/live2dcubismframework/5.0.0/live2dcubismframework.min.js"></script>
    
    <script>
        const statusEl = document.getElementById('status');
        statusEl.textContent = 'Core: ' + (typeof Live2DCubismCore !== 'undefined' ? '✅' : '❌') + ' | Framework: ' + (typeof Live2DCubismFramework !== 'undefined' ? '✅' : '❌');
    </script>
</body>
</html>
