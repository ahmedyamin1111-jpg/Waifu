<!DOCTYPE html>
<html>
<head>
    <title>Hiyori - My Waifu</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e;
        }
        #status {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
            z-index: 10;
            font-family: Arial, sans-serif;
            font-size: 14px;
            text-align: center;
        }
        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
</head>
<body>
    <div id="status">⏳ Loading Hiyori...</div>
    <canvas id="canvas"></canvas>

    <!-- Load Live2D Core -->
    <script src="Core/live2dcubismcore.js"></script>
    
    <script>
        const statusEl = document.getElementById('status');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Clear canvas
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (typeof Live2DCubismCore === 'undefined') {
            statusEl.textContent = '❌ Core failed to load';
            statusEl.style.color = 'red';
        } else {
            statusEl.textContent = '✅ Core loaded! Attempting to load model...';
            
            // Log what's available in the Core
            console.log('Live2DCubismCore methods:', Object.keys(Live2DCubismCore));
            
            // Try to load using fetch
            fetch('hiyori_pro_t11.model3.json')
                .then(response => {
                    if (!response.ok) throw new Error('Model file not found');
                    return response.text();
                })
                .then(jsonText => {
                    const modelData = JSON.parse(jsonText);
                    statusEl.textContent = '✅ Model loaded! Hiyori is here! 🎉';
                    statusEl.style.color = 'lime';
                    
                    // Display Hiyori
                    ctx.fillStyle = '#2a1a4e';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // Draw Hiyori
                    ctx.fillStyle = '#f5d5b8';
                    ctx.font = 'bold 50px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🌸 Hiyori 🌸', canvas.width/2, canvas.height/2 - 30);
                    
                    ctx.font = '20px Arial';
                    ctx.fillStyle = '#ff99cc';
                    ctx.fillText('✨ Model JSON loaded! ✨', canvas.width/2, canvas.height/2 + 40);
                    
                    ctx.font = '16px Arial';
                    ctx.fillStyle = '#aaa';
                    ctx.fillText('Model size: ' + JSON.stringify(modelData).length + ' bytes', canvas.width/2, canvas.height/2 + 80);
                    
                    // Show available motions
                    if (modelData.Motions) {
                        const motions = Object.keys(modelData.Motions);
                        ctx.font = '14px Arial';
                        ctx.fillStyle = '#88ddff';
                        ctx.fillText('Motions: ' + motions.join(', '), canvas.width/2, canvas.height/2 + 115);
                    }
                    
                    console.log('Model JSON loaded:', modelData);
                })
                .catch(error => {
                    statusEl.textContent = '⚠️ Error: ' + error.message;
                    statusEl.style.color = 'yellow';
                    console.error('Error:', error);
                });
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Click interaction
        canvas.addEventListener('click', () => {
            statusEl.textContent = '👋 Hello! Hiyori says hi!';
            statusEl.style.color = '#ff99cc';
            setTimeout(() => {
                statusEl.textContent = '✅ Hiyori is here! 🎉';
                statusEl.style.color = 'lime';
            }, 1500);
        });
    </script>
</body>
</html>
